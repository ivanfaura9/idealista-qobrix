name: Enriquecer contactos desde Calendar (cada hora)

on:
  schedule:
    - cron: "47 * * * *"   # cada hora a y 47, desfasado del watchdog (37) y resto
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run enrich
        env:
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          QOBRIX_URL:            ${{ secrets.QOBRIX_URL }}
          QOBRIX_USER:           ${{ secrets.QOBRIX_USER }}
          QOBRIX_KEY:            ${{ secrets.QOBRIX_KEY }}
        run: python enrich_from_calendar.py
